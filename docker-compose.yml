version: "3.8"

services:
  emqx:
    image: emqx/emqx:5.6.1
    container_name: emqx
    ports:
      - "1883:1883"     # MQTT
      - "8083:8083"     # MQTT WebSocket
      - "18083:18083"   # EMQX Dashboard
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: 0.0.0.0
      EMQX_LOADED_PLUGINS: "emqx_dashboard"
    volumes:
      - emqx_data:/opt/emqx/data
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  emqx_data:
  mongo_data:
